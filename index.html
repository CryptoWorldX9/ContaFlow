<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaFlow PRO</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">CF PRO</div>

    <input type="month" id="periodo">

    <div class="stats">
        <div><span>Ventas</span><b id="ventas">$0</b></div>
        <div><span>Compras</span><b id="compras">$0</b></div>
        <div><span>IVA</span><b id="iva">$0</b></div>
    </div>

    <button class="config-btn" onclick="toggleConfig()">⚙</button>
</aside>

<!-- MAIN -->
<main class="main">

<section class="card form">

<h2>Nuevo Documento</h2>

<form id="form">

<div class="row">
<input type="date" id="fecha" required>

<select id="tipoDoc">
<option>Factura Venta</option>
<option>Factura Compra</option>
<option>Boleta</option>
<option>Servicio</option>
</select>
</div>

<div class="row">
<select id="tipoItem">
<option value="compra">Compra</option>
<option value="servicio">Servicio</option>
</select>
</div>

<div class="row">
<input type="text" id="rut" placeholder="RUT (opcional)">
<input type="text" id="proveedor" placeholder="Proveedor (opcional)">
</div>

<!-- TABLA PRODUCTOS -->
<table class="items">
<thead>
<tr>
<th>Cant</th>
<th>Descripción</th>
<th>Precio</th>
<th>Subtotal</th>
<th></th>
</tr>
</thead>
<tbody id="itemsBody"></tbody>
</table>

<button type="button" class="add" onclick="addItem()">+ agregar</button>

<div class="totales">
<input id="neto" placeholder="Neto">
<input id="ivaCalc" placeholder="IVA" readonly>
<input id="total" placeholder="Total">
</div>

<button class="save">Guardar</button>

</form>
</section>

<section class="card">
<canvas id="chart"></canvas>
</section>

<section class="card">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Proveedor</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</section>

</main>

</div>

<!-- CONFIG -->
<div class="config" id="config">
<h3>Configuración</h3>

<label>IVA (%)</label>
<input id="configIva">

<button onclick="saveConfig()">Guardar</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
