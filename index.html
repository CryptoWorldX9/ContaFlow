<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContaFlow PRO</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<div class="app-shell">

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="brand-box">
        <div class="logo-icon">CF</div>
        <div class="brand-text">ContaFlow<span>PRO</span></div>
    </div>

    <input type="month" id="filtro-periodo" class="month-picker">

    <div class="stats">
        <div class="stat"><span>Ventas</span><b id="stat-ventas">$0</b></div>
        <div class="stat"><span>Caja</span><b id="stat-caja">$0</b></div>
        <div class="stat"><span>IVA</span><b id="stat-iva">$0</b></div>
    </div>

    <button onclick="abrirConfig()" class="btn-config">⚙️</button>
</aside>

<!-- MAIN -->
<main class="main">

<!-- FORM -->
<section class="card">
<h3>Nuevo Registro</h3>

<form id="form">

<input type="hidden" id="edit-id">

<div class="grid2">
<input type="date" id="fecha" required>

<select id="categoria">
<option value="negocio">Negocio</option>
<option value="caja">Caja chica</option>
</select>
</div>

<select id="tipo">
<option value="Factura Venta">Factura Venta</option>
<option value="Factura Compra">Factura Compra</option>
<option value="Boleta Venta">Boleta Venta</option>
<option value="Servicio">Pago Servicio</option>
</select>

<select id="subtipo">
<option value="Compra">Compra</option>
<option value="Servicio">Servicio</option>
</select>

<!-- proveedor opcional -->
<div class="grid2 opcional">
<input type="text" id="rut" placeholder="RUT proveedor (opcional)">
<input type="text" id="proveedor" placeholder="Proveedor (opcional)">
</div>

<!-- detalle avanzado -->
<div id="detalle-lista"></div>
<button type="button" onclick="agregarItem()">+ Agregar item</button>

<div class="money">
<input type="number" id="neto" placeholder="Neto">
<input type="number" id="iva" placeholder="IVA" readonly>
<input type="number" id="total" placeholder="Total">
</div>

<button type="submit">Guardar</button>

</form>
</section>

<!-- CHART -->
<section class="card">
<canvas id="chart"></canvas>
</section>

<!-- TABLA -->
<section class="card">
<table>
<thead>
<tr>
<th>Fecha</th>
<th>Tipo</th>
<th>Proveedor</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</section>

</main>

</div>

<!-- MODAL CONFIG -->
<div id="configModal" class="modal">
<div class="modal-content">
<h3>Configuración</h3>

<label>Tipos personalizados</label>
<input id="nuevoTipo" placeholder="Ej: Arriendo">
<button onclick="agregarTipo()">Agregar</button>

<ul id="listaTipos"></ul>

<button onclick="cerrarConfig()">Cerrar</button>
</div>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
