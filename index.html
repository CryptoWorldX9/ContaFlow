<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ContaFlow Pro | Business Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="main-layout">
        <aside class="sidebar">
            <div class="logo">ContaFlow <span>Pro</span></div>
            <div class="sidebar-stats">
                <div class="mini-stat"><span>Ventas</span><h3 id="stat-ventas">$0</h3></div>
                <div class="mini-stat"><span>IVA Mes</span><h3 id="stat-iva">$0</h3></div>
            </div>
            <div class="sidebar-actions">
                <button onclick="exportarReporte('pdf')" class="btn-exp pdf">PDF</button>
                <button onclick="exportarReporte('excel')" class="btn-exp xls">EXCEL</button>
            </div>
        </aside>

        <main class="content">
            <div class="grid-container">
                <section class="card form-card">
                    <h3>➕ Registro de Movimientos</h3>
                    <form id="registro-form">
                        <input type="hidden" id="edit-id">
                        <div class="form-group">
                            <label>Fecha</label>
                            <input type="date" id="fecha" required>
                        </div>
                        <div class="form-group">
                            <label>Categoría</label>
                            <select id="categoria" required>
                                <option value="negocio">Libro Compra/Venta (IVA)</option>
                                <option value="cajachica">Caja Chica (Renta)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Tipo de Documento</label>
                            <select id="tipo" required>
                                <option value="Factura Venta">Factura Venta</option>
                                <option value="Factura Compra">Factura Compra</option>
                                <option value="Boleta Venta">Boleta Venta</option>
                                <option value="Gasto Caja Chica">Gasto Caja Chica</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Detalle</label>
                            <input type="text" id="detalle" placeholder="Ej: Repuestos L200" required>
                        </div>
                        <div class="grid-3-col">
                            <input type="number" id="neto" placeholder="Neto" required>
                            <input type="number" id="iva" placeholder="IVA" readonly>
                            <input type="number" id="total" placeholder="Total" readonly>
                        </div>
                        <button type="submit" id="btn-submit" class="btn-primary">GUARDAR DATOS</button>
                    </form>
                </section>

                <section class="card chart-card">
                    <h3>📊 Resumen de Flujos</h3>
                    <div class="canvas-container">
                        <canvas id="myChart"></canvas>
                    </div>
                </section>

                <section class="card table-card">
                    <div class="table-header">
                        <h3>Historial</h3>
                        <div class="filter-chips">
                            <button class="chip active" data-val="Factura Venta">Ventas</button>
                            <button class="chip active" data-val="Factura Compra">Compras</button>
                            <button class="chip active" data-val="Gasto Caja Chica">Caja Chica</button>
                        </div>
                    </div>
                    <div class="table-scroll">
                        <table id="tabla-registros">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Tipo</th>
                                    <th>Detalle</th>
                                    <th>Total</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-datos"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
