<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ContaFlow Pro | Sistema Integrado</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 1024px)">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-box">
                <div class="logo-icon">CF</div>
                <div class="brand-text">ContaFlow<span>PRO</span></div>
            </div>

            <div class="period-selector">
                <label>PERÍODO</label>
                <input type="month" id="filtro-periodo" class="month-picker">
            </div>
            
            <div class="nav-menu">
                <div class="stat-card blue"><span class="label">Ventas</span><h2 id="stat-ventas">$0</h2></div>
                <div class="stat-card red"><span class="label">Gastos</span><h2 id="stat-gastos">$0</h2></div>
                <div class="stat-card purple"><span class="label">IVA Neto</span><h2 id="stat-iva">$0</h2></div>
            </div>

            <div class="export-actions">
                <button class="btn-settings" onclick="toggleConfig()">⚙️ Ajustes</button>
            </div>
        </aside>

        <main class="main-content">
            <section class="glass-card form-section">
                <div class="card-header"><h3>Registro Contable</h3></div>
                <form id="registro-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="input-row">
                        <div class="field"><label>Fecha</label><input type="date" id="fecha" required></div>
                        <div class="field">
                            <label>Clasificación</label>
                            <select id="item-tipo">
                                <option value="Mercadería">📦 Mercadería</option>
                                <option value="Servicio">⚡ Servicio (Luz/Sii/Tel)</option>
                                <option value="Venta">💰 Venta</option>
                                <option value="Insumos">🛠️ Insumos Taller</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="field">
                            <label>Documento</label>
                            <select id="tipo" required>
                                <option value="Factura Venta">Factura Venta</option>
                                <option value="Boleta Venta">Boleta Venta</option>
                                <option value="Factura Compra">Factura Compra</option>
                                <option value="Gasto Caja Chica">Gasto Caja Chica</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>RUT / Proveedor (Opcional)</label>
                            <input type="text" id="proveedor" placeholder="Ej: 76.xxx.xxx-k">
                        </div>
                    </div>

                    <div class="field">
                        <label>Detalle / Listado de Productos</label>
                        <textarea id="detalle" rows="3" placeholder="Ingresa los productos aquí..." required></textarea>
                    </div>

                    <div class="money-grid">
                        <div class="money-field"><label>Neto</label><input type="number" id="neto"></div>
                        <div class="money-field"><label>IVA</label><input type="number" id="iva" readonly></div>
                        <div class="money-field total-hl"><label>Total</label><input type="number" id="total"></div>
                    </div>
                    <button type="submit" id="btn-submit" class="btn-confirm">GUARDAR REGISTRO</button>
                </form>
            </section>

            <section class="glass-card chart-section">
                <div class="chart-container">
                    <canvas id="myChart"></canvas>
                </div>
            </section>

            <section class="glass-card table-section">
                <div class="table-header-pro">
                    <h3>Movimientos</h3>
                    <div class="filter-chips">
                        <button class="chip active" data-val="Venta">Ventas</button>
                        <button class="chip active" data-val="Compra">Compras</button>
                        <button class="chip active" data-val="Caja">Caja</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Ítem</th>
                                <th>Detalle</th>
                                <th>Total</th>
                                <th class="text-right">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista-datos"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-config" class="modal" style="display:none;">
        <div class="modal-content glass-card">
            <h3>⚙️ Configuración</h3>
            <div class="field">
                <label>Tasa de IVA actual (%)</label>
                <input type="number" id="config-iva" value="19">
            </div>
            <button onclick="toggleConfig()" class="btn-confirm">Cerrar</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function toggleConfig() {
            const m = document.getElementById('modal-config');
            m.style.display = m.style.display === 'none' ? 'flex' : 'none';
        }
    </script>
</body>
</html>
