<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContaFlow Pro | Gestión Contable</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <h2>ContaFlow <span>Pro</span></h2>
        <div class="stats-brief">
            <div class="stat-item"><span>Ventas Mes</span><p id="stat-ventas">$0</p></div>
            <div class="stat-item"><span>IVA a Pago</span><p id="stat-iva">$0</p></div>
        </div>
        <div class="filters-side">
            <label>Filtrar por Mes</label>
            <input type="month" id="filtro-mes">
            <button onclick="resetFiltro()" class="btn-secondary">Ver Todo</button>
        </div>
    </div>

    <main class="content">
        <header>
            <h1>Panel Contable</h1>
            <button onclick="generarPDF()" class="btn-primary">Exportar PDF</button>
        </header>

        <div class="dashboard-grid">
            <section class="card">
                <h3>➕ Nuevo Movimiento</h3>
                <form id="registro-form">
                    <input type="hidden" id="edit-id">
                    <div class="input-group"><label>Fecha</label><input type="date" id="fecha" required></div>
                    <div class="input-group">
                        <label>Categoría</label>
                        <select id="categoria" required>
                            <option value="negocio">Compra/Venta (IVA)</option>
                            <option value="cajachica">Caja Chica (Renta)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Documento</label>
                        <select id="tipo" required>
                            <option value="Factura Venta">Factura Venta</option>
                            <option value="Factura Compra">Factura Compra</option>
                            <option value="Boleta Venta">Boleta Venta</option>
                            <option value="Gasto con Boleta">Gasto Caja Chica</option>
                        </select>
                    </div>
                    <div class="input-group"><label>Detalle</label><input type="text" id="detalle" required></div>
                    <div class="grid-3-col">
                        <input type="number" id="neto" placeholder="Neto" required>
                        <input type="number" id="iva" placeholder="IVA" readonly>
                        <input type="number" id="total" placeholder="Total" readonly>
                    </div>
                    <button type="submit" id="btn-submit" class="btn-save">Guardar Registro</button>
                </form>
            </section>

            <section class="card chart-container">
                <h3>📊 Flujo de Caja</h3>
                <canvas id="myChart"></canvas>
            </section>
        </div>

        <section class="card table-container">
            <h3>Historial de Movimientos</h3>
            <table id="tabla-registros">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Tipo</th>
                        <th>Detalle</th>
                        <th>Neto</th>
                        <th>IVA</th>
                        <th>Total</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-datos"></tbody>
            </table>
        </section>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
