<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Conta Pro | Sistema Contable Empresarial</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f7fb;
            color: #1a1f36;
            overflow-x: hidden;
        }

        /* Scrollbar Moderno */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #e4e8f0;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Layout Principal */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Premium */
        .sidebar-premium {
            width: 280px;
            background: linear-gradient(180deg, #0a0f2c 0%, #070b1f 100%);
            color: #e2e8f0;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 8px 0 30px rgba(0, 0, 0, 0.12);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 10;
        }

        .brand-premium {
            padding: 32px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 28px;
        }

        .logo-wrapper-premium {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon-premium {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 22px;
            color: white;
            box-shadow: 0 10px 20px -8px rgba(59, 130, 246, 0.4);
        }

        .brand-text-premium {
            font-weight: 800;
            font-size: 1.6rem;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand-text-premium span {
            background: linear-gradient(135deg, #3b82f6, #38bdf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        /* Period Selector */
        .period-premium {
            background: rgba(255, 255, 255, 0.05);
            margin: 0 20px 28px 20px;
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .period-label-premium {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 10px;
        }

        .month-input-premium {
            background: #0f1326;
            border: 1px solid #1e2438;
            color: white;
            padding: 12px 14px;
            border-radius: 14px;
            width: 100%;
            font-weight: 500;
            outline: none;
            transition: all 0.2s;
        }

        .month-input-premium:focus {
            border-color: #3b82f6;
        }

        /* KPI Cards */
        .kpi-stack-premium {
            margin: 0 20px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .kpi-card-premium {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 18px;
            padding: 16px;
            border-left: 4px solid;
            transition: transform 0.2s, background 0.2s;
        }

        .kpi-card-premium:hover {
            background: rgba(59, 130, 246, 0.08);
        }

        .kpi-card-premium.ventas { border-left-color: #3b82f6; }
        .kpi-card-premium.caja { border-left-color: #f97316; }
        .kpi-card-premium.iva { border-left-color: #8b5cf6; }

        .kpi-title-premium {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 1px;
        }

        .kpi-value-premium {
            font-size: 1.6rem;
            font-weight: 800;
            margin-top: 8px;
            color: white;
            letter-spacing: -1px;
        }

        /* Botones Exportar y Config */
        .actions-premium {
            margin-top: auto;
            padding: 24px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-premium {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #1e2438;
            border-radius: 40px;
            padding: 12px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            color: #e2e8f0;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-premium.pdf:hover { background: #e11d48; border-color: #e11d48; }
        .btn-premium.excel:hover { background: #059669; border-color: #059669; }
        .btn-premium.config { background: rgba(59, 130, 246, 0.15); border-color: #3b82f6; color: #60a5fa; }
        .btn-premium.config:hover { background: #3b82f6; color: white; }

        /* Main Content */
        .main-premium {
            flex: 1;
            padding: 28px 36px;
            background: #f5f7fb;
        }

        .header-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .title-premium h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .badge-premium {
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            color: #475569;
            font-size: 0.85rem;
        }

        /* Grid y Cards */
        .grid-premium {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 28px;
            margin-bottom: 32px;
        }

        .card-premium {
            background: white;
            border-radius: 28px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #eef2ff;
            overflow: hidden;
        }

        .card-header-premium {
            padding: 22px 26px 0 26px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card-header-premium h3 {
            font-weight: 700;
            font-size: 1.15rem;
            color: #0f172a;
        }

        /* Formulario */
        .form-premium {
            padding: 20px 26px 26px;
        }

        .form-grid-premium {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .input-group-premium {
            margin-bottom: 8px;
        }

        .input-group-premium label {
            font-size: 0.7rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        .input-premium {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: #ffffff;
        }

        .input-premium:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.08);
        }

        /* Items List */
        .items-container-premium {
            background: #f8fafc;
            border-radius: 18px;
            padding: 16px;
            margin: 16px 0;
        }

        .item-row-premium {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .item-row-premium input {
            flex: 1;
            min-width: 100px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
        }

        .btn-add-premium {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 8px;
        }

        .btn-remove-premium {
            background: #ef4444;
            color: white;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 32px;
            cursor: pointer;
            font-weight: bold;
        }

        .money-row-premium {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            background: #f1f5f9;
            padding: 18px;
            border-radius: 20px;
            margin: 16px 0;
        }

        .btn-save-premium {
            background: linear-gradient(105deg, #0f172a, #1e293b);
            border: none;
            padding: 16px;
            border-radius: 40px;
            font-weight: 800;
            color: white;
            width: 100%;
            cursor: pointer;
            font-size: 0.9rem;
            transition: transform 0.1s;
        }

        .btn-save-premium:active {
            transform: scale(0.98);
        }

        .chart-premium {
            padding: 20px;
            height: 280px;
        }

        .fullwidth-premium {
            grid-column: span 2;
        }

        .table-wrapper-premium {
            overflow-x: auto;
            padding: 0 4px 24px 4px;
        }

        .data-table-premium {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        .data-table-premium th {
            text-align: left;
            padding: 16px 16px;
            background: #f8fafc;
            font-size: 0.75rem;
            font-weight: 700;
            color: #475569;
            border-bottom: 2px solid #e2e8f0;
        }

        .data-table-premium td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.85rem;
        }

        .badge-premium-tipo {
            background: #eef2ff;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #1e40af;
            display: inline-block;
        }

        .actions-premium-icons i {
            margin: 0 6px;
            cursor: pointer;
            color: #94a3b8;
            transition: 0.2s;
            font-size: 1.1rem;
        }

        .actions-premium-icons i:hover {
            color: #3b82f6;
        }

        .filter-bar-premium {
            display: flex;
            gap: 10px;
            margin: 16px 20px;
            flex-wrap: wrap;
        }

        .chip-premium {
            background: white;
            border: 1.5px solid #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip-premium.active {
            background: #0f172a;
            color: white;
            border-color: #0f172a;
        }

        .text-right {
            text-align: right;
        }

        /* Modal */
        .modal-premium {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content-premium {
            background: white;
            border-radius: 32px;
            max-width: 550px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 28px;
        }

        .modal-header-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .close-premium {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #64748b;
        }

        .config-item-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid #e2e8f0;
        }

        .config-item-premium button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
        }

        .add-config-premium {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }

        .add-config-premium input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .app-container {
                flex-direction: column;
            }

            .sidebar-premium {
                width: 100%;
                height: auto;
                position: relative;
                flex-direction: row;
                flex-wrap: wrap;
                padding-bottom: 16px;
                gap: 12px;
            }

            .brand-premium {
                flex: 1;
                padding: 16px 20px;
                margin: 0;
                border-bottom: none;
            }

            .period-premium {
                width: auto;
                min-width: 180px;
                margin: 8px 12px;
                padding: 12px;
            }

            .kpi-stack-premium {
                flex-direction: row;
                overflow-x: auto;
                margin: 8px 12px;
                gap: 12px;
            }

            .kpi-card-premium {
                min-width: 140px;
                flex-shrink: 0;
            }

            .kpi-value-premium {
                font-size: 1.2rem;
            }

            .actions-premium {
                flex-direction: row;
                margin: 8px 12px;
                padding: 0;
                width: auto;
            }

            .btn-premium {
                padding: 10px 18px;
                font-size: 0.75rem;
            }

            .main-premium {
                padding: 20px;
            }

            .title-premium h1 {
                font-size: 1.4rem;
            }

            .grid-premium {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .fullwidth-premium {
                grid-column: span 1;
            }

            .form-grid-premium {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .money-row-premium {
                grid-template-columns: 1fr;
            }

            .input-premium {
                font-size: 1rem;
                height: 48px;
            }

            .btn-save-premium {
                height: 52px;
            }

            .chart-premium {
                height: 240px;
            }
        }

        @media (max-width: 480px) {
            .kpi-card-premium {
                min-width: 120px;
            }

            .kpi-value-premium {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar-premium">
        <div class="brand-premium">
            <div class="logo-wrapper-premium">
                <div class="logo-icon-premium">CP</div>
                <div class="brand-text-premium">Conta<span>Pro</span></div>
            </div>
        </div>
        <div class="period-premium">
            <div class="period-label-premium"><i class="fas fa-calendar-alt"></i> PERÍODO CONTABLE</div>
            <input type="month" id="periodo-mes" class="month-input-premium">
        </div>
        <div class="kpi-stack-premium">
            <div class="kpi-card-premium ventas">
                <div class="kpi-title-premium"><i class="fas fa-chart-line"></i> Ventas Netas</div>
                <div class="kpi-value-premium" id="kpi-ventas">$0</div>
            </div>
            <div class="kpi-card-premium caja">
                <div class="kpi-title-premium"><i class="fas fa-coins"></i> Caja Chica</div>
                <div class="kpi-value-premium" id="kpi-caja">$0</div>
            </div>
            <div class="kpi-card-premium iva">
                <div class="kpi-title-premium"><i class="fas fa-percent"></i> IVA a Pagar</div>
                <div class="kpi-value-premium" id="kpi-iva">$0</div>
            </div>
        </div>
        <div class="actions-premium">
            <button class="btn-premium config" onclick="abrirModalConfig()"><i class="fas fa-cog"></i> CONFIGURACIÓN</button>
            <button class="btn-premium pdf" onclick="exportarReporte('pdf')"><i class="fas fa-file-pdf"></i> PDF</button>
            <button class="btn-premium excel" onclick="exportarReporte('excel')"><i class="fas fa-file-excel"></i> EXCEL</button>
        </div>
    </aside>
    <main class="main-premium">
        <div class="header-premium">
            <div class="title-premium"><h1><i class="fas fa-chart-pie"></i> Dashboard Ejecutivo</h1></div>
            <div class="badge-premium"><i class="far fa-clock"></i> Tiempo Real</div>
        </div>
        <div class="grid-premium">
            <div class="card-premium">
                <div class="card-header-premium"><h3><i class="fas fa-plus-circle"></i> Registrar Movimiento</h3></div>
                <form id="form-registro" class="form-premium">
                    <input type="hidden" id="edit-id">
                    <div class="form-grid-premium">
                        <div class="input-group-premium"><label>Fecha</label><input type="date" id="fecha" class="input-premium" required></div>
                        <div class="input-group-premium"><label>Categoría</label><select id="categoria" class="input-premium" required><option value="negocio">Libro Compra/Venta</option><option value="cajachica">Caja Chica</option></select></div>
                        <div class="input-group-premium"><label>Tipo Documento</label><select id="tipo" class="input-premium" required></select></div>
                        <div class="input-group-premium"><label>Subcategoría</label><select id="subcategoria" class="input-premium"><option value="producto">Producto/Mercancía</option><option value="servicio">Servicio (Internet, Teléfono, Luz, etc)</option></select></div>
                    </div>
                    <div class="input-group-premium"><label>Proveedor/Cliente (Opcional)</label><input type="text" id="proveedor" class="input-premium" placeholder="RUT o Nombre"></div>
                    
                    <div class="items-container-premium">
                        <label style="font-weight:700; font-size:0.75rem; color:#475569;">📦 Items / Conceptos</label>
                        <div id="items-list"></div>
                        <button type="button" class="btn-add-premium" onclick="agregarItem()">+ Agregar Item</button>
                    </div>
                    
                    <div class="money-row-premium">
                        <div><label>Neto $</label><input type="number" id="neto" class="input-premium" placeholder="0" readonly></div>
                        <div><label>IVA $</label><input type="number" id="iva" class="input-premium" readonly></div>
                        <div><label>Total $</label><input type="number" id="total" class="input-premium" placeholder="0"></div>
                    </div>
                    <button type="submit" id="btn-submit" class="btn-save-premium"><i class="fas fa-save"></i> GUARDAR REGISTRO</button>
                </form>
            </div>
            <div class="card-premium">
                <div class="card-header-premium"><h3><i class="fas fa-chart-bar"></i> Comparativa Mensual</h3></div>
                <div class="chart-premium"><canvas id="chartComparativo"></canvas></div>
            </div>
            <div class="card-premium fullwidth-premium">
                <div class="card-header-premium"><h3><i class="fas fa-table-list"></i> Libro Mayor</h3></div>
                <div class="filter-bar-premium">
                    <button class="chip-premium active" data-filter="Factura Venta">📈 Ventas</button>
                    <button class="chip-premium active" data-filter="Factura Compra">📦 Compras</button>
                    <button class="chip-premium active" data-filter="Gasto Caja Chica">💵 Caja Chica</button>
                    <button class="chip-premium active" data-filter="Factura Servicio">🔧 Servicios</button>
                </div>
                <div class="table-wrapper-premium">
                    <table class="data-table-premium">
                        <thead>
                            <tr><th>Fecha</th><th>Tipo</th><th>Proveedor</th><th>Detalle Items</th><th>Neto</th><th>IVA</th><th>Total</th><th>Acciones</th></tr>
                        </thead>
                        <tbody id="tabla-cuerpo"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal Configuración -->
<div id="modalConfig" class="modal-premium">
    <div class="modal-content-premium">
        <div class="modal-header-premium">
            <h3><i class="fas fa-sliders-h"></i> Configuración Avanzada</h3>
            <button class="close-premium" onclick="cerrarModalConfig()">&times;</button>
        </div>
        <h4>Tipo de Documentos</h4>
        <div id="tipos-list"></div>
        <div class="add-config-premium"><input type="text" id="newTipo" placeholder="Ej: Nota Crédito"><button onclick="agregarTipoConfig()" class="btn-add-premium">+ Agregar</button></div>
        <hr style="margin: 20px 0">
        <h4>Subcategorías</h4>
        <div id="subcat-list"></div>
        <div class="add-config-premium"><input type="text" id="newSubcat" placeholder="Ej: Honorarios"><button onclick="agregarSubcatConfig()" class="btn-add-premium">+ Agregar</button></div>
        <hr style="margin: 20px 0">
        <button class="btn-save-premium" onclick="cerrarModalConfig()">Cerrar</button>
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
        }
    }
</script>

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc } from "firebase/firestore";
    
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyAVu7GL7IxjgwNGqrIzMp0Xn9ra5c30eEE",
        authDomain: "contaflow-22b0e.firebaseapp.com",

    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const registrosRef = collection(db, "registros");
    let allData = [];
    let chartInstance = null;
    let itemsArray = [{ nombre: "", cantidad: 1, precio: 0 }];
    
    // Configuración dinámica
    let tiposDocumento = ["Factura Venta", "Factura Compra", "Boleta Venta", "Gasto Caja Chica", "Factura Servicio"];
    let subcategorias = ["producto", "servicio"];
    
    function guardarConfigLocal() {
        localStorage.setItem("tiposDocContaPro", JSON.stringify(tiposDocumento));
        localStorage.setItem("subcatContaPro", JSON.stringify(subcategorias));
    }
    
    function cargarConfigLocal() {
        const t = localStorage.getItem("tiposDocContaPro");
        if (t) tiposDocumento = JSON.parse(t);
        const s = localStorage.getItem("subcatContaPro");
        if (s) subcategorias = JSON.parse(s);
    }
    
    cargarConfigLocal();
    
    function actualizarSelectTipos() {
        const select = document.getElementById('tipo');
        if (!select) return;
        select.innerHTML = '';
        tiposDocumento.forEach(t => {
            const opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t;
            select.appendChild(opt);
        });
    }
    
    function renderizarConfigModal() {
        const tiposDiv = document.getElementById('tipos-list');
        if (tiposDiv) {
            tiposDiv.innerHTML = '';
            tiposDocumento.forEach((t, idx) => {
                const div = document.createElement('div');
                div.className = 'config-item-premium';
                div.innerHTML = `<span>${t}</span><button onclick="eliminarTipoConfig(${idx})">Eliminar</button>`;
                tiposDiv.appendChild(div);
            });
        }
        const subcatDiv = document.getElementById('subcat-list');
        if (subcatDiv) {
            subcatDiv.innerHTML = '';
            subcategorias.forEach((s, idx) => {
                const div = document.createElement('div');
                div.className = 'config-item-premium';
                div.innerHTML = `<span>${s}</span><button onclick="eliminarSubcatConfig(${idx})">Eliminar</button>`;
                subcatDiv.appendChild(div);
            });
        }
    }
    
    window.agregarTipoConfig = () => {
        const input = document.getElementById('newTipo');
        if (input.value.trim()) {
            tiposDocumento.push(input.value.trim());
            guardarConfigLocal();
            actualizarSelectTipos();
            renderizarConfigModal();
            input.value = '';
        }
    };
    
    window.eliminarTipoConfig = (idx) => {
        tiposDocumento.splice(idx, 1);
        guardarConfigLocal();
        actualizarSelectTipos();
        renderizarConfigModal();
    };
    
    window.agregarSubcatConfig = () => {
        const input = document.getElementById('newSubcat');
        if (input.value.trim()) {
            subcategorias.push(input.value.trim());
            guardarConfigLocal();
            const subcatSelect = document.getElementById('subcategoria');
            if (subcatSelect) {
                subcatSelect.innerHTML = '';
                subcategorias.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = s;
                    opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
                    subcatSelect.appendChild(opt);
                });
            }
            renderizarConfigModal();
            input.value = '';
        }
    };
    
    window.eliminarSubcatConfig = (idx) => {
        subcategorias.splice(idx, 1);
        guardarConfigLocal();
        const subcatSelect = document.getElementById('subcategoria');
        if (subcatSelect) {
            subcatSelect.innerHTML = '';
            subcategorias.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = s.charAt(0).toUpperCase() + s.slice(1);
                subcatSelect.appendChild(opt);
            });
        }
        renderizarConfigModal();
    };
    
    window.abrirModalConfig = () => {
        renderizarConfigModal();
        document.getElementById('modalConfig').style.display = 'flex';
    };
    
    window.cerrarModalConfig = () => {
        document.getElementById('modalConfig').style.display = 'none';
    };
    
    // Items dinámicos
    window.agregarItem = () => {
        itemsArray.push({ nombre: "", cantidad: 1, precio: 0 });
        renderItemsList();
    };
    
    window.eliminarItem = (idx) => {
        itemsArray.splice(idx, 1);
        if (itemsArray.length === 0) itemsArray.push({ nombre: "", cantidad: 1, precio: 0 });
        renderItemsList();
        calcularTotalesItems();
    };
    
    window.actualizarItem = (idx, campo, valor) => {
        if (campo === 'cantidad' || campo === 'precio') {
            itemsArray[idx][campo] = parseFloat(valor) || 0;
        } else {
            itemsArray[idx][campo] = valor;
        }
        calcularTotalesItems();
    };
    
    function renderItemsList() {
        const container = document.getElementById('items-list');
        if (!container) return;
        container.innerHTML = '';
        itemsArray.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'item-row-premium';
            div.innerHTML = `
                <input type="text" placeholder="Producto/Servicio" value="${item.nombre}" onchange="actualizarItem(${idx},'nombre',this.value)" style="flex:2">
                <input type="number" placeholder="Cant" value="${item.cantidad}" onchange="actualizarItem(${idx},'cantidad',this.value)" style="width:70px">
                <input type="number" placeholder="Precio" value="${item.precio}" onchange="actualizarItem(${idx},'precio',this.value)" style="width:100px">
                <button class="btn-remove-premium" onclick="eliminarItem(${idx})">✕</button>
            `;
            container.appendChild(div);
        });
    }
    
    function calcularTotalesItems() {
        let netoTotal = 0;
        itemsArray.forEach(item => {
            netoTotal += (item.cantidad || 0) * (item.precio || 0);
        });
        document.getElementById('neto').value = Math.round(netoTotal);
        const tipo = document.getElementById('tipo').value;
        const esFactura = tipo.includes("Factura");
        const iva = esFactura ? Math.round(netoTotal * 0.19) : 0;
        document.getElementById('iva').value = iva;
        document.getElementById('total').value = netoTotal + iva;
    }
