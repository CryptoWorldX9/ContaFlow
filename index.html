<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ContaFlow Pro | Sistema Contable</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="brand">ContaFlow <span>PRO</span></div>
            <div class="quick-stats">
                <div class="stat-box">
                    <span>Ventas Mes</span>
                    <h2 id="stat-ventas">$0</h2>
                </div>
                <div class="stat-box">
                    <span>IVA Estimado</span>
                    <h2 id="stat-iva">$0</h2>
                </div>
            </div>
            <div class="export-zone">
                <button onclick="exportarReporte('pdf')" class="btn-pdf">Exportar PDF</button>
                <button onclick="exportarReporte('excel')" class="btn-xls">Exportar Excel</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="dashboard">
                <section class="card form-container">
                    <h3>➕ Registro</h3>
                    <form id="registro-form">
                        <input type="hidden" id="edit-id">
                        <div class="form-row">
                            <div class="field">
                                <label>Fecha</label>
                                <input type="date" id="fecha" required>
                            </div>
                            <div class="field">
                                <label>Categoría</label>
                                <select id="categoria" required>
                                    <option value="negocio">Libro Compra/Venta</option>
                                    <option value="cajachica">Caja Chica</option>
                                </select>
                            </div>
                        </div>
                        <div class="field">
                            <label>Tipo Documento</label>
                            <select id="tipo" required>
                                <option value="Factura Venta">Factura Venta</option>
                                <option value="Factura Compra">Factura Compra</option>
                                <option value="Boleta Venta">Boleta Venta</option>
                                <option value="Gasto Caja Chica">Gasto Caja Chica</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Detalle</label>
                            <input type="text" id="detalle" placeholder="Ej: Repuestos L200" required>
                        </div>
                        <div class="monto-grid">
                            <input type="number" id="neto" placeholder="Neto" required>
                            <input type="number" id="iva" placeholder="IVA" readonly>
                            <input type="number" id="total" placeholder="Total" readonly>
                        </div>
                        <button type="submit" id="btn-submit" class="btn-main">GUARDAR DATOS</button>
                    </form>
                </section>

                <section class="card chart-container">
                    <h3>📊 Resumen</h3>
                    <div class="chart-wrapper">
                        <canvas id="myChart"></canvas>
                    </div>
                </section>

                <section class="card table-container">
                    <div class="table-header">
                        <h3>Historial</h3>
                        <div class="chips-container">
                            <button class="chip active" data-val="Factura Venta">Ventas</button>
                            <button class="chip active" data-val="Factura Compra">Compras</button>
                            <button class="chip active" data-val="Gasto Caja Chica">Caja</button>
                        </div>
                    </div>
                    <div class="scrollable">
                        <table id="tabla-registros">
                            <thead>
                                <tr>
                                    <th>Fecha</th>
                                    <th>Tipo</th>
                                    <th>Total</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="lista-datos"></tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
