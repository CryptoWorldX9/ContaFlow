<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ContaFlow Pro v2</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css" media="screen and (max-width: 1024px)">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand-box">
                <div class="logo-icon">CF</div>
                <div class="brand-text">ContaFlow<span>PRO</span></div>
            </div>

            <div class="period-selector">
                <label>PERÍODO</label>
                <input type="month" id="filtro-periodo" class="month-picker">
            </div>
            
            <div class="nav-menu">
                <div class="stat-card blue"><span class="label">Ventas</span><h2 id="stat-ventas">$0</h2></div>
                <div class="stat-card red"><span class="label">Gastos/Compras</span><h2 id="stat-gastos">$0</h2></div>
                <div class="stat-card purple"><span class="label">IVA Neto</span><h2 id="stat-iva">$0</h2></div>
            </div>

            <div class="export-actions">
                <button onclick="exportarReporte('pdf')" class="btn-pro pdf">📄 PDF</button>
                <button onclick="exportarReporte('excel')" class="btn-pro excel">📊 EXCEL</button>
            </div>

            <button class="btn-settings" onclick="toggleConfig()">⚙️ Configuración</button>
        </aside>

        <main class="main-content">
            <section class="glass-card form-section">
                <div class="card-header"><h3>Registro de Movimiento</h3></div>
                <form id="registro-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="input-row">
                        <div class="field"><label>Fecha</label><input type="date" id="fecha" required></div>
                        <div class="field">
                            <label>Tipo de Ítem</label>
                            <select id="item-tipo">
                                <option value="Mercadería">📦 Compra Mercadería</option>
                                <option value="Servicio">⚡ Pago de Servicio</option>
                                <option value="Venta">💰 Venta Producto/Servicio</option>
                                <option value="Insumo">🛠️ Insumos Taller</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-row">
                        <div class="field">
                            <label>Documento</label>
                            <select id="tipo" required>
                                <option value="Factura Venta">Factura Venta</option>
                                <option value="Boleta Venta">Boleta Venta</option>
                                <option value="Factura Compra">Factura Compra</option>
                                <option value="Gasto Caja Chica">Gasto Caja Chica</option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Proveedor/Cliente (Opcional)</label>
                            <input type="text" id="proveedor" placeholder="Nombre o RUT">
                        </div>
                    </div>

                    <div class="field">
                        <label>Descripción / Listado de Productos</label>
                        <textarea id="detalle" rows="3" placeholder="Ej:&#10;- Motosierra MS 250&#10;- Aceite 2T 1L&#10;- Cadena 3/8" required></textarea>
                    </div>

                    <div class="money-grid">
                        <div class="money-field"><label>Neto</label><input type="number" id="neto"></div>
                        <div class="money-field"><label>IVA</label><input type="number" id="iva" readonly></div>
                        <div class="money-field total-hl"><label>Total</label><input type="number" id="total"></div>
                    </div>
                    <button type="submit" id="btn-submit" class="btn-confirm">GUARDAR EN REGISTRO</button>
                </form>
            </section>

            <section class="glass-card table-section">
                <div class="table-header-pro">
                    <h3>Movimientos</h3>
                    <div class="filter-chips">
                        <button class="chip active" data-val="Venta">Ventas</button>
                        <button class="chip active" data-val="Compra">Compras</button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="tabla-maestra">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Ítem/Tipo</th>
                                <th>Detalle</th>
                                <th>Total</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="lista-datos"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content glass-card">
            <div class="card-header">
                <h3>⚙️ Configuración del Sistema</h3>
                <button onclick="toggleConfig()" class="btn-close">×</button>
            </div>
            <div class="config-grid">
                <div class="config-item">
                    <label>Gestionar Tipos de Ítems</label>
                    <div class="tag-manager">
                        <input type="text" id="new-tag" placeholder="Nuevo ítem...">
                        <button onclick="addTag()">Añadir</button>
                    </div>
                    <ul id="tag-list"></ul>
                </div>
                <div class="config-item">
                    <label>Porcentaje de Impuesto (%)</label>
                    <input type="number" id="config-iva" value="19">
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script>
        function toggleConfig() {
            const modal = document.getElementById('modal-config');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
